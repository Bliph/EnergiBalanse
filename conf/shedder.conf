[times]
adjust_period = 30
calculation_period_duration = 3600
loop_sleep = 10
max_offline_time = 300

[mqtt_server]
# Connection + credentials are supplied at runtime via environment variables
# (MQTT_HOST, MQTT_PORT, MQTT_USERNAME, MQTT_PASSWORD) — see deploy/docker.env.
# The values below are non-secret local-dev placeholders and are overridden
# whenever the matching environment variable is set. Do NOT commit real secrets.
host = localhost
port = 1883
username =
password =

[mqtt_client]
measurement_topic = geiterasen/HAN_gw/+/measurements
power_element_pos = P_pos
power_element_neg = P_neg
energy_element_pos = A_pos
energy_element_neg = A_neg
timestamp_element = timestamp
root_topic = geiterasen/shedder_test
status_topic = status
control_topic = control

[location]
lat = 58.0880027
lon = 7.8252463

[control]
energy_deadband_up = 300
energy_deadband_down = 0

[tesla_client]
# Tesla account email is supplied via the TESLA_EMAIL environment variable
# (see deploy/docker.env). Left blank here so no account is committed.
user_id =
update_period = 10

[logging]
log_level = DEBUG
log_dir = .

[healthcheck]
# healthchecks.io ping URL for Tesla auth health. Supplied at runtime via the
# HEALTHCHECK_TESLA_AUTH_URL environment variable (see deploy/docker.env). Left
# blank so pinging is disabled unless configured.
tesla_auth_url =
# How often (seconds) the main loop re-verifies Tesla auth and pings the check.
# Set the check's period on healthchecks.io a bit LONGER than this.
ping_period = 900
