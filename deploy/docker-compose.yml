# EnergiBalanse — production stack for a single host.
#
# Run from the repository root:
#   docker compose -f deploy/docker-compose.yml up -d --build
#
# All secrets/connection settings live in deploy/docker.env — copy
# deploy/docker.env.template to deploy/docker.env and fill it in.
#
# Scope: this stack runs the "shedder" service only (the EV charge controller).
# The OCPP-MQTT bridge under ocpp/ is NOT containerized here. If you want it too,
# add a second service from this same image with command ["python","main.py"]
# and publish its inbound port (8180).

name: energibalanse

services:
  shedder:
    build:
      context: ..
      dockerfile: Dockerfile
    image: energibalanse:latest
    restart: unless-stopped        # auto-restart on crash, reboot, or fatal error
    env_file: docker.env
    # No ports: outbound-only (MQTT broker + Tesla REST API).
    volumes:
      # Persistent runtime state, OUTSIDE the git working tree so the deploy's
      # `git reset --hard` can never wipe it. Holds the Tesla OAuth token cache,
      # the dynamic control file (shedder_control.yaml), the power/energy buffers
      # and the log files. The container reads/writes here via STATE_DIR=/state.
      #
      # FIRST RUN: seed the Tesla token cache (interactive auth can't happen in a
      # container) and, optionally, your tuned control file, into the volume. The
      # chown is required so the non-root container user (uid 10001) can rewrite
      # the token cache when it refreshes:
      #   docker run --rm \
      #     -v energibalanse_shedder-state:/state \
      #     -v "$PWD/conf":/seed:ro busybox \
      #     sh -c "cp /seed/tesla_cache.json /state/ && \
      #            cp /seed/shedder_control.yaml /state/ 2>/dev/null; \
      #            chown -R 10001:10001 /state"
      - shedder-state:/state

volumes:
  shedder-state:
